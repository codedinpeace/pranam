<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pranam Shaw — Full Stack Developer</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/SplitText.min.js"></script>

<!-- React -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  :root {
    --bg: #060606;
    --bg2: #0d0d0d;
    --fg: #f0ece3;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --muted: #444;
    --muted2: #888;
    --border: rgba(240,236,227,0.08);
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor {
    position: fixed; top: 0; left: 0; z-index: 9999;
    pointer-events: none;
    mix-blend-mode: difference;
  }
  #cursor-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: transform .1s ease;
  }
  #cursor-ring {
    position: fixed; top: 0; left: 0;
    width: 40px; height: 40px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width .3s, height .3s, border-color .3s;
    pointer-events: none;
    z-index: 9998;
  }
  body:hover #cursor-ring { opacity: 1; }
  .cursor-grow #cursor-ring { width: 70px !important; height: 70px !important; border-color: var(--accent2) !important; }

  /* ── NOISE OVERLAY ── */
  #noise {
    position: fixed; inset: 0; z-index: 9997;
    pointer-events: none;
    opacity: .03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    animation: noiseShift 0.15s steps(1) infinite;
  }
  @keyframes noiseShift { 0%{background-position:0 0} 10%{background-position:-5% -10%} 20%{background-position:-15% 5%} 30%{background-position:7% -25%} 40%{background-position:-5% 25%} 50%{background-position:-15% 10%} 60%{background-position:15% 0} 70%{background-position:0 15%} 80%{background-position:3% 35%} 90%{background-position:-10% 10%} 100%{background-position:0 0} }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0; z-index: 9990;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2rem;
  }
  #loader-bar-wrap {
    width: 300px; height: 1px;
    background: var(--muted);
    overflow: hidden;
  }
  #loader-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .05s linear;
  }
  #loader-pct {
    font-family: var(--font-mono);
    font-size: .75rem;
    color: var(--muted2);
    letter-spacing: .2em;
  }
  #loader-name {
    font-family: var(--font-display);
    font-size: clamp(3rem, 10vw, 8rem);
    letter-spacing: .1em;
    line-height: 1;
    overflow: hidden;
  }
  #loader-name span { display: inline-block; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 3rem;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s, background .3s;
  }
  nav.scrolled {
    border-color: var(--border);
    background: rgba(6,6,6,.8);
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: .8rem;
    letter-spacing: .15em;
    color: var(--accent);
  }
  .nav-links {
    display: flex; gap: 2.5rem; list-style: none;
  }
  .nav-links a {
    font-family: var(--font-mono);
    font-size: .7rem;
    letter-spacing: .15em;
    color: var(--muted2);
    text-decoration: none;
    text-transform: uppercase;
    transition: color .2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -2px; left: 0;
    width: 0; height: 1px;
    background: var(--accent);
    transition: width .3s;
  }
  .nav-links a:hover { color: var(--fg); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    font-family: var(--font-mono);
    font-size: .7rem;
    letter-spacing: .15em;
    color: var(--bg);
    background: var(--accent);
    border: none; cursor: none;
    padding: .6rem 1.4rem;
    text-transform: uppercase;
    clip-path: polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
    transition: background .2s;
  }
  .nav-cta:hover { background: var(--accent2); color: var(--fg); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 3rem 6rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: var(--font-display);
    font-size: clamp(8rem, 25vw, 22rem);
    color: rgba(240,236,227,.025);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: -.02em;
    user-select: none;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: .7rem;
    letter-spacing: .3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 40px; height: 1px;
    background: var(--accent);
  }
  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(5rem, 14vw, 13rem);
    line-height: .9;
    letter-spacing: -.02em;
    overflow: hidden;
    position: relative;
  }
  .hero-name .line { overflow: hidden; display: block; }
  .hero-name .word { display: inline-block; }
  .hero-dot {
    color: var(--accent);
    display: inline-block;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  .hero-bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-top: 3rem;
  }
  .hero-desc {
    max-width: 380px;
    font-size: .95rem;
    line-height: 1.7;
    color: var(--muted2);
    font-weight: 300;
  }
  .hero-desc strong { color: var(--fg); font-weight: 400; }
  .hero-cta-group {
    display: flex; flex-direction: column; align-items: flex-end; gap: 1rem;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: .7rem;
    font-family: var(--font-mono); font-size: .75rem;
    letter-spacing: .1em; text-transform: uppercase;
    text-decoration: none;
    color: var(--bg); background: var(--accent);
    padding: 1rem 2rem;
    clip-path: polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
    transition: background .2s, transform .2s;
    cursor: none;
  }
  .btn-primary:hover { background: var(--fg); transform: translate(-2px,-2px); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: .7rem;
    font-family: var(--font-mono); font-size: .75rem;
    letter-spacing: .1em; text-transform: uppercase;
    text-decoration: none;
    color: var(--fg); background: transparent;
    border: 1px solid var(--border);
    padding: 1rem 2rem;
    transition: border-color .2s, background .2s;
    cursor: none;
  }
  .btn-outline:hover { border-color: var(--fg); background: rgba(240,236,227,.04); }
  .hero-scroll {
    position: absolute; bottom: 3rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    font-family: var(--font-mono); font-size: .6rem;
    letter-spacing: .2em; color: var(--muted);
    text-transform: uppercase;
    animation: scrollBounce 2s ease-in-out infinite;
  }
  .hero-scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, var(--muted), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollBounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(6px)} }
  @keyframes scrollLine { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: .5rem;
    font-family: var(--font-mono); font-size: .65rem;
    letter-spacing: .1em; color: var(--muted2);
    text-transform: uppercase;
    margin-top: .75rem;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: statusPulse 1.5s ease-in-out infinite;
  }
  @keyframes statusPulse { 0%,100%{box-shadow:0 0 4px #4ade80} 50%{box-shadow:0 0 12px #4ade80} }

  /* ── MARQUEE ── */
  .marquee-wrap {
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 0;
    background: var(--bg2);
  }
  .marquee-track {
    display: flex; gap: 4rem;
    white-space: nowrap;
    animation: marquee 18s linear infinite;
  }
  .marquee-wrap:hover .marquee-track { animation-play-state: paused; }
  .marquee-item {
    font-family: var(--font-display);
    font-size: 1.1rem;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 4rem;
  }
  .marquee-item .sep {
    color: var(--accent);
    font-size: 1.5rem;
    font-weight: 300;
  }
  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── SECTION COMMONS ── */
  section { padding: 8rem 3rem; }
  .section-label {
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .3em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 4rem;
  }
  .section-label::after {
    content: '';
    flex: 1; max-width: 80px; height: 1px;
    background: var(--accent);
    opacity: .4;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 1;
    letter-spacing: -.02em;
    overflow: hidden;
  }

  /* ── ABOUT ── */
  #about { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
  .about-left .big-num {
    font-family: var(--font-display);
    font-size: clamp(6rem, 14vw, 11rem);
    color: var(--border);
    line-height: 1;
    position: absolute;
    right: -1rem; top: -2rem;
    pointer-events: none;
    letter-spacing: -.04em;
    z-index: 0;
  }
  .about-text-wrap { position: relative; }
  .about-body {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--muted2);
    font-weight: 300;
    margin-top: 2rem;
  }
  .about-body strong { color: var(--fg); font-weight: 400; }
  .about-body p + p { margin-top: 1.2rem; }
  .about-right { display: flex; flex-direction: column; gap: 3rem; }
  .stat-item {
    display: flex; align-items: flex-start; gap: 1.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .stat-item:last-child { border-bottom: none; padding-bottom: 0; }
  .stat-num {
    font-family: var(--font-display);
    font-size: 3.5rem;
    line-height: 1;
    color: var(--accent);
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--muted2);
    text-transform: uppercase;
    margin-top: .3rem;
  }

  /* ── SKILLS ── */
  #skills { background: var(--bg2); }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-top: 4rem;
  }
  .skill-card {
    background: var(--bg2);
    padding: 1.5rem;
    display: flex; flex-direction: column; align-items: center; gap: .75rem;
    cursor: none;
    transition: background .25s;
    position: relative;
    overflow: hidden;
  }
  .skill-card::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform .3s cubic-bezier(.25,.46,.45,.94);
    z-index: 0;
  }
  .skill-card:hover::before { transform: scaleY(1); }
  .skill-card:hover .skill-name { color: var(--bg); }
  .skill-card:hover .skill-icon { filter: brightness(0); }
  .skill-icon {
    width: 36px; height: 36px;
    object-fit: contain;
    position: relative; z-index: 1;
    filter: grayscale(1) brightness(1.5);
    transition: filter .3s;
  }
  .skill-icon-emoji {
    font-size: 1.8rem;
    position: relative; z-index: 1;
    transition: filter .3s;
  }
  .skill-name {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted2);
    position: relative; z-index: 1;
    transition: color .3s;
  }

  /* ── PROJECTS ── */
  #projects { }
  .projects-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 3rem;
  }
  .project-item {
    border-top: 1px solid var(--border);
    overflow: hidden;
  }
  .project-item:last-child { border-bottom: 1px solid var(--border); }
  .project-trigger {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2.5rem 0;
    cursor: none;
    transition: padding .3s;
    gap: 2rem;
  }
  .project-trigger:hover { padding-left: 1rem; }
  .project-num {
    font-family: var(--font-mono);
    font-size: .65rem;
    color: var(--accent);
    letter-spacing: .1em;
    min-width: 40px;
  }
  .project-title-wrap { flex: 1; }
  .project-name {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    letter-spacing: .02em;
    line-height: 1;
    transition: color .2s;
  }
  .project-trigger:hover .project-name { color: var(--accent); }
  .project-tags {
    display: flex; flex-wrap: wrap; gap: .4rem;
    margin-top: .5rem;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: .55rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted2);
    border: 1px solid var(--border);
    padding: .2rem .5rem;
  }
  .project-arrow {
    font-size: 1.5rem;
    color: var(--muted);
    transition: transform .3s, color .3s;
    flex-shrink: 0;
  }
  .project-item.open .project-arrow {
    transform: rotate(45deg);
    color: var(--accent);
  }
  .project-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height .6s cubic-bezier(.25,.46,.45,.94);
  }
  .project-item.open .project-panel {
    max-height: 700px;
  }
  .project-content {
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem;
    padding: 0 0 3rem;
    align-items: start;
  }
  .project-preview {
    aspect-ratio: 16/10;
    background: var(--bg2);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .project-preview-inner {
    width: 90%; height: 85%;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    transform: perspective(600px) rotateY(-5deg) rotateX(3deg);
    box-shadow: -20px 20px 40px rgba(0,0,0,.5);
    transition: transform .4s ease;
  }
  .project-item.open .project-preview-inner {
    animation: previewFloat 5s ease-in-out infinite;
  }
  @keyframes previewFloat {
    0%,100%{transform:perspective(600px) rotateY(-5deg) rotateX(3deg) translateY(0)}
    50%{transform:perspective(600px) rotateY(-5deg) rotateX(3deg) translateY(-8px)}
  }
  .preview-bar {
    height: 28px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .4rem;
    padding: 0 .8rem;
    flex-shrink: 0;
  }
  .preview-dot { width: 8px; height: 8px; border-radius: 50%; }
  .preview-screen {
    flex: 1;
    padding: .8rem;
    font-family: var(--font-mono);
    font-size: .5rem;
    color: var(--muted2);
    line-height: 1.6;
    overflow: hidden;
  }
  .preview-screen .hl { color: var(--accent); }
  .preview-screen .hl2 { color: #7dd3fc; }
  .preview-screen .hl3 { color: #f9a8d4; }
  .project-info h3 {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: .04em;
    margin-bottom: 1rem;
    color: var(--accent);
  }
  .project-desc {
    font-size: .9rem;
    line-height: 1.8;
    color: var(--muted2);
    font-weight: 300;
    margin-bottom: 1.5rem;
  }
  .project-links {
    display: flex; gap: 1rem; flex-wrap: wrap;
  }
  .project-link {
    display: inline-flex; align-items: center; gap: .4rem;
    font-family: var(--font-mono);
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: .6rem 1.2rem;
    transition: all .2s;
    cursor: none;
  }
  .project-link:hover { border-color: var(--accent); color: var(--accent); }
  .tech-stack {
    margin-top: 1.5rem;
    display: flex; flex-wrap: wrap; gap: .4rem;
  }
  .tech-pill {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    padding: .3rem .7rem;
  }

  /* ── GITHUB GRAPH ── */
  #github { background: var(--bg2); }
  .github-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 3rem;
  }
  .github-stats {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 3rem;
  }
  .gh-stat {
    background: var(--bg2);
    padding: 2rem;
    text-align: center;
  }
  .gh-stat-num {
    font-family: var(--font-display);
    font-size: 3rem;
    color: var(--accent);
    display: block;
  }
  .gh-stat-label {
    font-family: var(--font-mono);
    font-size: .6rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-top: .3rem;
    display: block;
  }
  .activity-graph-wrap {
    overflow-x: auto;
    padding-bottom: 1rem;
  }
  .activity-graph {
    display: flex; gap: 3px; align-items: flex-end;
  }
  .ag-week {
    display: flex; flex-direction: column; gap: 3px;
  }
  .ag-day {
    width: 11px; height: 11px;
    border-radius: 2px;
    background: rgba(240,236,227,.05);
    cursor: none;
    transition: transform .15s;
  }
  .ag-day:hover { transform: scale(1.6); }
  .ag-day.l0 { background: rgba(240,236,227,.04); }
  .ag-day.l1 { background: rgba(232,255,71,.2); }
  .ag-day.l2 { background: rgba(232,255,71,.45); }
  .ag-day.l3 { background: rgba(232,255,71,.7); }
  .ag-day.l4 { background: var(--accent); }
  .ag-months {
    display: flex; margin-bottom: .5rem;

/* ─── ACTIVITY GRAPH ─── */
function generateGitHubData() {
  const weeks = [];
  const today = new Date();
  for (let w = 52; w >= 0; w--) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(today.getDate() - (w * 7) - (6 - d));
      const r = Math.random();
      let level = 0;
      if (r > 0.55) level = 1;
      if (r > 0.72) level = 2;
      if (r > 0.84) level = 3;
      if (r > 0.93) level = 4;
      week.push({ level, date });
    }
    weeks.push(week);
  }
  return weeks;
}

<script>
/* ─── GSAP INIT ─── */
gsap.registerPlugin(ScrollTrigger, TextPlugin);

/* ─── CURSOR ─── */
const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
(function lerp() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(lerp);
})();
document.querySelectorAll('a, button, .skill-card, .project-trigger, .ag-day').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-grow'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-grow'));
});

/* ─── PARTICLES ─── */
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
for (let i = 0; i < 60; i++) {
  particles.push({ x: Math.random()*1920, y: Math.random()*1080, vx: (Math.random()-.5)*.2, vy: (Math.random()-.5)*.2, r: Math.random()*1.5+.5, o: Math.random()*.4+.1 });
}
function drawParticles() {
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x<0) p.x=W; if (p.x>W) p.x=0;
    if (p.y<0) p.y=H; if (p.y>H) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(232,255,71,${p.o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ─── SCROLL PROGRESS ─── */
const prog = document.getElementById('scroll-progress');
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  prog.style.transform = `scaleX(${pct})`;
});

/* ─── NAV SCROLL ─── */
window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 50);
});

/* ─── LOADER ─── */
const loaderBar = document.getElementById('loader-bar');
const loaderPct = document.getElementById('loader-pct');
let pct = 0;
const loaderInterval = setInterval(() => {
  pct += Math.random() * 8 + 2;
  if (pct >= 100) { pct = 100; clearInterval(loaderInterval); runLoader(); }
  loaderBar.style.width = pct + '%';
  loaderPct.textContent = String(Math.floor(pct)).padStart(3,'0') + '%';
}, 60);

function runLoader() {
  gsap.to('#loader-name span', {
    y: -120, stagger: .04, duration: .6, ease: 'power3.in',
    delay: .3,
    onComplete: () => {
      gsap.to('#loader', { opacity: 0, duration: .4, onComplete: () => { document.getElementById('loader').style.display = 'none'; runHeroAnim(); } });
    }
  });
}

/* ─── HERO ANIMATIONS ─── */
function runHeroAnim() {
  const tl = gsap.timeline();
  tl.from('#hero-eyebrow', { y: 30, opacity: 0, duration: .8, ease: 'power3.out' })
    .from('#hw1', { y: 150, duration: 1, ease: 'power4.out' }, '-=.4')
    .from('#hw2', { y: 150, duration: 1, ease: 'power4.out' }, '-=.7')
    .from('#hero-desc', { y: 30, opacity: 0, duration: .8, ease: 'power3.out' }, '-=.4')
    .from('#hero-ctas', { y: 30, opacity: 0, duration: .8, ease: 'power3.out' }, '-=.6')
    .from('.hero-scroll', { opacity: 0, duration: .6 }, '-=.4');

  /* Hero parallax */
  gsap.to('.hero-bg-text', {
    yPercent: 30,
    ease: 'none',
    scrollTrigger: { trigger: '#hero', scrub: 1 }
  });

  /* Reveal on scroll */
  gsap.utils.toArray('.reveal').forEach(el => {
    gsap.fromTo(el,
      { y: 50, opacity: 0 },
      { y: 0, opacity: 1, duration: .9, ease: 'power3.out',
        scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' }
      }
    );
  });

  /* Counter animation */
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseInt(el.dataset.count);
    const suffix = el.textContent.replace(/[0-9]/g,'').trim();
    ScrollTrigger.create({
      trigger: el,
      start: 'top 80%',
      once: true,
      onEnter: () => {
        gsap.to({ val: 0 }, {
          val: target, duration: 1.5, ease: 'power2.out',
          onUpdate: function() { el.textContent = Math.round(this.targets()[0].val) + suffix; }
        });
      }
    });
  });

  /* Scramble text on project names */
  const chars = '!<>-_\\/[]{}—=+*^?#@$%&';
  document.querySelectorAll('.project-name').forEach(el => {
    const original = el.textContent;
    el.addEventListener('mouseenter', () => {
      let iter = 0;
      const iv = setInterval(() => {
        el.textContent = original.split('').map((c, i) => {
          if (i < iter) return original[i];
          return c === ' ' ? ' ' : chars[Math.floor(Math.random()*chars.length)];
        }).join('');
        if (iter >= original.length) clearInterval(iv);
        iter += 1/2;
      }, 30);
    });
  });
}

/* ─── GSAP SKILLS CARDS STAGGER ─── */
window.addEventListener('load', () => {
  setTimeout(() => {
    gsap.utils.toArray('.skill-card').forEach((card, i) => {
      gsap.from(card, {
        scale: 0.8, opacity: 0, duration: .4, ease: 'power2.out',
        delay: i * 0.03,
        scrollTrigger: { trigger: '#skills', start: 'top 70%', once: true }
      });
    });
  }, 1000);
});
</script>
