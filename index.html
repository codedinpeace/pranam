<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pranam Shaw — Full Stack Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #0d0d0d;
  --bg2: #111;
  --fg: #f0ece3;
  --fg2: #b8b4ab;
  --dim: #555;
  --dim2: #2a2a2a;
  --rule: rgba(240,236,227,0.09);
  --f-serif: "Inter", sans-serif;
  --f-sans: 'Outfit', sans-serif;
  --f-mono: 'Manrope', monospace;

  /* Responsive spacing */
  --pad-x: clamp(1.2rem, 5vw, 4rem);
  --pad-section: clamp(4rem, 10vw, 9rem);
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--f-serif);
  overflow-x: hidden;
  cursor: none;
}

/* Touch devices: show default cursor */
@media (hover: none) and (pointer: coarse) {
  body { cursor: auto; }
  a, button { cursor: pointer; }
}

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim2); }

/* ── CURSOR (desktop only) ── */
#cdot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--fg); mix-blend-mode: difference;
  transform: translate(-50%,-50%);
  transition: width .15s, height .15s;
}
#cring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(240,236,227,.3);
  transform: translate(-50%,-50%);
  transition: width .35s cubic-bezier(.25,.46,.45,.94), height .35s cubic-bezier(.25,.46,.45,.94);
}
.cx #cring { width: 58px; height: 58px; }
.cx #cdot  { width: 4px;  height: 4px;  }
@media (hover: none) and (pointer: coarse) {
  #cdot, #cring { display: none; }
}

/* ── SCROLL PROGRESS ── */
#sp { position:fixed; top:0; left:0; right:0; height:2px; background:var(--fg); opacity:.35; transform:scaleX(0); transform-origin:left; z-index:8000; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; z-index:7000;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2rem; padding: 1.5rem;
}
#lt {
  font-family:var(--f-sans); font-weight:800;
  font-size: clamp(3.5rem, 14vw, 11rem);
  letter-spacing:-.05em; line-height:1;
  display:flex; overflow:hidden;
}
#lt span { display:inline-block; transform:translateY(120%); }
#lbar { width: min(280px,80vw); height:1px; background:var(--dim2); position:relative; overflow:hidden; }
#lfill { position:absolute; inset:0; background:var(--fg); transform:scaleX(0); transform-origin:left; }
#lnum { font-family:var(--f-mono); font-size:.65rem; letter-spacing:.25em; color:var(--dim); }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:600;
  display:flex; align-items:center; justify-content:space-between;
  padding: 1.8rem var(--pad-x);
  transition: padding .4s, background .4s, border-color .4s;
  border-bottom: 1px solid transparent;
}
nav.stuck {
  padding: 1.1rem var(--pad-x);
  background:rgba(13,13,13,.92);
  backdrop-filter:blur(14px);
  border-color:var(--rule);
}
.nlogo { font-family:var(--f-mono); font-size: clamp(.75rem, 2vw, 1rem); letter-spacing:.22em; text-transform:uppercase; color:var(--fg2); }
.nlinks { display:flex; gap:2.2rem; list-style:none; }
.nlinks a {
  font-family:var(--f-serif); font-size:.88rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--dim); text-decoration:none; cursor:none;
  transition:color .25s;
}
.nlinks a:hover { color:var(--fg); }
.nhire {
  font-family:var(--f-mono); font-size:.62rem; letter-spacing:.12em;
  text-transform:uppercase; background:var(--fg); color:var(--bg);
  border:none; padding:.55rem 1.3rem; cursor:none; transition:opacity .2s;
  font-weight:600; white-space:nowrap;
}
.nhire:hover { opacity:.78; }
.nav-mobile-btn {
  display:none;
  background:none; border:none; color:var(--fg2); cursor:pointer;
  flex-direction:column; gap:5px; padding:4px;
}
.nav-mobile-btn span {
  display:block; width:22px; height:1.5px; background:currentColor;
  transition: transform .3s, opacity .3s;
}
.nav-mobile-btn.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
.nav-mobile-btn.open span:nth-child(2) { opacity:0; }
.nav-mobile-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }

/* ── HERO ── */
#hero {
  min-height: 100svh;
  padding: 0 var(--pad-x) clamp(3rem,8vh,6rem);
  display:flex; flex-direction:column; justify-content:flex-end;
  position:relative; overflow:hidden;
}
.h-eyebrow {
  font-family:var(--f-mono); font-size: clamp(.5rem, 1.5vw, .62rem); letter-spacing:.18em;
  text-transform:uppercase; color:var(--dim);
  display:flex; align-items:center; gap:.8rem;
  margin-bottom:1.5rem; opacity:0; flex-wrap:wrap; row-gap:.4rem;
}
.h-dot { width:4px; height:4px; border-radius:50%; background:var(--fg2); animation:blink 2s ease-in-out infinite; flex-shrink:0; }
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.h1 {
  font-family:var(--f-sans); font-weight:800;
  font-size: clamp(3.8rem, 14vw, 14rem);
  line-height:.88; letter-spacing:-.04em; overflow:hidden;
}
.h1 .ln { overflow:hidden; display:block; }
.h1 .wd { display:inline-block; transform:translateY(110%); }
.h-bot {
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-top: clamp(2rem,4vh,3.8rem); gap:2rem; opacity:0; flex-wrap:wrap;
}
.h-desc {
  max-width:380px; font-size: clamp(.9rem, 2vw, 1.05rem); line-height:1.8;
  color:var(--fg2);
}
.h-desc em { font-style:italic; color:var(--fg); }
.h-act { display:flex; flex-direction:column; align-items:flex-end; gap:.9rem; }
.btn-s {
  display:inline-block; font-family:var(--f-mono); font-size:.65rem;
  letter-spacing:.12em; text-transform:uppercase; text-decoration:none;
  background:var(--fg); color:var(--bg); padding:.82rem 2rem;
  cursor:none; transition:opacity .2s; border:1px solid transparent;
  font-weight:600; white-space:nowrap;
}
.btn-s:hover { opacity:.78; }
.btn-o {
  display:inline-block; font-family:var(--f-mono); font-size:.65rem;
  letter-spacing:.12em; text-transform:uppercase; text-decoration:none;
  color:var(--fg2); padding:.82rem 2rem; border:1px solid var(--rule);
  cursor:none; transition:border-color .2s, color .2s;
  font-weight:600; white-space:nowrap;
}
.btn-o:hover { border-color:rgba(240,236,227,.35); color:var(--fg); }
.h-av { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:flex; align-items:center; gap:.5rem; }
.avdot { width:5px; height:5px; border-radius:50%; background:#888; }
.h-sc {
  position:absolute; bottom: clamp(2.5rem,5vh,5rem); left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:.6rem; opacity:0;
}
.h-sc span { font-family:var(--f-mono); font-size:.5rem; letter-spacing:.25em; text-transform:uppercase; color:var(--dim); writing-mode:vertical-rl; }
.scline { width:1px; height:55px; background:linear-gradient(var(--dim),transparent); animation:drip 2s ease-in-out infinite; }
@keyframes drip{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:.8;transform:scaleY(1.2)}}

/* ── TICKER ── */
.ticker { overflow:hidden; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:.9rem 0; }
.tinner { display:flex; gap:0; white-space:nowrap; animation:tick 24s linear infinite; }
.ticker:hover .tinner { animation-play-state:paused; }
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.titem { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dim); padding:0 2.2rem; border-right:1px solid var(--rule); flex-shrink:0; }

/* ── SECTIONS ── */
.sw { padding: var(--pad-section) var(--pad-x); }
.sidx { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dim); display:flex; align-items:center; gap:1.4rem; margin-bottom:2.5rem; }
.sidx::after { content:''; flex:0 0 44px; height:1px; background:var(--dim2); }
.sh2 { font-family:var(--f-sans); font-weight:800; font-size:clamp(2.2rem,5.5vw,5.5rem); letter-spacing:-.04em; line-height:1; }

/* ── ABOUT ── */
#about { display:grid; grid-template-columns:1fr 1fr; gap:clamp(3rem,8vw,8rem); align-items:center; }
.abody { font-size: clamp(.9rem, 1.5vw, 1.05rem); line-height:1.85; color:var(--fg2); margin-top:2.5rem; }
.abody p+p { margin-top:1.2rem; }
.abody em { font-style:italic; color:var(--fg); }
.scol { display:flex; flex-direction:column; }
.srow { display:flex; align-items:baseline; gap:1.5rem; padding:1.6rem 0; border-bottom:1px solid var(--rule); flex-wrap:wrap; }
.srow:first-child { border-top:1px solid var(--rule); }
.sn { font-family:var(--f-sans); font-weight:800; font-size:clamp(2.2rem,5vw,3.5rem); letter-spacing:-.04em; line-height:1; min-width:5rem; }
.sl { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); line-height:1.6; }
.ss { font-family:var(--f-serif); font-style:italic; font-size:.85rem; color:var(--dim); display:block; margin-top:.25rem; }

/* ── SKILLS ── */
#skills { border-top:1px solid var(--rule); }
.sgrid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(min(130px, 100%), 1fr));
  border-left:1px solid var(--rule); border-top:1px solid var(--rule); margin-top:3rem;
}
.sc {
  border-right:1px solid var(--rule); border-bottom:1px solid var(--rule);
  padding:1.4rem 1.2rem; cursor:none; position:relative; overflow:hidden;
  transition:background .3s;
}
.sc::after { content:''; position:absolute; inset:0; background:var(--fg); transform:scaleY(0); transform-origin:bottom; transition:transform .32s cubic-bezier(.25,.46,.45,.94); z-index:0; }
.sc:hover::after { transform:scaleY(1); }
.sc:hover .skn, .sc:hover .skc { color:var(--bg); }
.skn { font-family:var(--f-sans); font-size:.88rem; font-weight:600; position:relative; z-index:1; transition:color .3s; }
.skc { font-family:var(--f-mono); font-size:.52rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); position:relative; z-index:1; transition:color .3s; margin-top:.45rem; }

/* ── PROJECTS ── */
#projects { border-top:1px solid var(--rule); }
.prow { border-bottom:1px solid var(--rule); }
.ptrig {
  width:100%; display:flex; align-items:center;
  padding: clamp(1.4rem,3vw,2.2rem) 0; gap: clamp(1rem,2.5vw,2.5rem); cursor:none;
  background:none; border:none; color:inherit; text-align:left;
  transition:padding-left .38s cubic-bezier(.25,.46,.45,.94);
}
.ptrig:hover { padding-left:.7rem; }
.pi { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.1em; color:var(--dim); min-width:2rem; flex-shrink:0; }
.pnw { flex:1; min-width:0; }
.pname { font-family:var(--f-sans); font-weight:700; font-size:clamp(1.3rem,3.5vw,2.7rem); letter-spacing:-.03em; line-height:1; transition:color .2s; word-break:break-word; }
.ptrig:hover .pname { color:var(--fg2); }
.pcats { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.4rem; }
.pcat { font-family:var(--f-mono); font-size:.5rem; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); border:1px solid var(--rule); padding:.18rem .5rem; }
.pyr { font-family:var(--f-mono); font-size:.62rem; color:var(--dim); flex-shrink:0; letter-spacing:.08em; }
.pplus { font-size:1.9rem; color:var(--dim); flex-shrink:0; line-height:1; transition:transform .38s cubic-bezier(.25,.46,.45,.94), color .2s; font-family:var(--f-serif); font-weight:300; }
.prow.open .pplus { transform:rotate(45deg); color:var(--fg); }
.ppanel { overflow:hidden; max-height:0; transition:max-height .7s cubic-bezier(.25,.46,.45,.94); }
.prow.open .ppanel { max-height:900px; }
.pinner { display:grid; grid-template-columns:1fr 1.1fr; gap:3rem; padding:0 0 3rem; }
.pwin {
  border:1px solid var(--rule); background:var(--bg2);
  overflow:hidden;
  transform:perspective(900px) rotateY(-4deg) rotateX(2deg);
  box-shadow:-14px 20px 44px rgba(0,0,0,.55);
  transition:transform .5s ease;
}
.prow.open .pwin { animation:wfloat 6s ease-in-out infinite; }
@keyframes wfloat{0%,100%{transform:perspective(900px) rotateY(-4deg) rotateX(2deg) translateY(0)}50%{transform:perspective(900px) rotateY(-4deg) rotateX(2deg) translateY(-8px)}}
.wbar { background:#1a1a1a; border-bottom:1px solid var(--rule); padding:.6rem .85rem; display:flex; align-items:center; gap:.38rem; }
.wdot { width:8px; height:8px; border-radius:50%; }
.wscr { padding:.9rem; font-family:var(--f-mono); font-size:.5rem; line-height:1.7; color:var(--dim); min-height:190px; overflow:hidden; }
.wc { color:var(--fg2); }
.wi { color:#777; font-style:italic; }
.wm { color:var(--fg); }
.pdet h3 { font-family:var(--f-sans); font-weight:700; font-size:clamp(1.2rem,2.5vw,1.55rem); letter-spacing:-.02em; margin-bottom:1rem; }
.pdesc { font-size: clamp(.88rem,1.5vw,1rem); line-height:1.82; color:var(--fg2); font-style:italic; margin-bottom:1.8rem; }
.trow { display:flex; flex-wrap:wrap; gap:.38rem; margin-bottom:1.5rem; }
.ttag { font-family:var(--f-mono); font-size:.52rem; letter-spacing:.1em; text-transform:uppercase; color:var(--fg2); border:1px solid var(--rule); padding:.28rem .65rem; }
.plrow { display:flex; gap:.9rem; flex-wrap:wrap; }
.pl { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--fg2); text-decoration:none; border:1px solid var(--rule); padding:.55rem 1.1rem; cursor:none; transition:all .2s; }
.pl:hover { color:var(--fg); border-color:rgba(240,236,227,.35); }

/* ── GITHUB ── */
#github { border-top:1px solid var(--rule); }
.ghtop { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:3rem; gap:2rem; flex-wrap:wrap; }
.ghcards { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--rule); margin-bottom:3rem; }
.ghc { padding:clamp(1.5rem,3vw,2.5rem) clamp(1rem,3vw,2rem); border-right:1px solid var(--rule); text-align:center; }
.ghc:last-child { border-right:none; }
.ghn { font-family:var(--f-sans); font-weight:800; font-size:clamp(2rem,5vw,3rem); letter-spacing:-.04em; display:block; margin-bottom:.4rem; }
.ghl { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); }
.agmons { display:flex; margin-bottom:.45rem; overflow-x:auto; }
.agmons span { font-family:var(--f-mono); font-size:.48rem; color:var(--dim); letter-spacing:.04em; min-width:52px; flex-shrink:0; }
.agscroll { overflow-x:auto; padding-bottom:.6rem; -webkit-overflow-scrolling:touch; }
.aggrid { display:flex; gap:3px; }
.agcol { display:flex; flex-direction:column; gap:3px; }
.agc { width:11px; height:11px; border-radius:2px; flex-shrink:0; cursor:none; transition:transform .12s; }
.agc:hover { transform:scale(1.5); position:relative; z-index:1; }
.agc.l0 { background:rgba(240,236,227,.05); }
.agc.l1 { background:rgba(240,236,227,.18); }
.agc.l2 { background:rgba(240,236,227,.38); }
.agc.l3 { background:rgba(240,236,227,.62); }
.agc.l4 { background:rgba(240,236,227,.92); }
.agleg { display:flex; align-items:center; gap:.5rem; justify-content:flex-end; margin-top:.8rem; font-family:var(--f-mono); font-size:.52rem; color:var(--dim); letter-spacing:.08em; }
.agleg .agc { position:static; transform:none; cursor:default; }
.agleg .agc:hover { transform:none; }

/* ── REVIEWS ── */
#reviews { border-top:1px solid var(--rule); overflow:hidden; }
.rscroll { overflow:hidden; margin-top:3.5rem; }
.rtrack { display:flex; gap:1.4rem; width:max-content; animation:rmove 32s linear infinite; }
.rtrack:hover { animation-play-state:paused; }
@keyframes rmove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.rcard { min-width: clamp(280px, 80vw, 370px); background:var(--bg2); border:1px solid var(--rule); padding:clamp(1.5rem,3vw,2.2rem); flex-shrink:0; transition:border-color .3s; }
.rcard:hover { border-color:rgba(240,236,227,.22); }
.rstars { margin-bottom:1rem; font-size:.7rem; letter-spacing:.12em; color:var(--fg2); }
.rq { font-size: clamp(.85rem,1.5vw,1rem); line-height:1.78; color:var(--fg2); font-style:italic; margin-bottom:1.8rem; }
.rwho { display:flex; align-items:center; gap:.9rem; }
.rav { width:35px; height:35px; border-radius:50%; background:var(--dim2); display:flex; align-items:center; justify-content:center; font-family:var(--f-sans); font-size:.78rem; font-weight:700; flex-shrink:0; }
.rname { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; }
.rrole { font-family:var(--f-mono); font-size:.52rem; color:var(--dim); margin-top:.2rem; }

/* ── CONTACT ── */
#contact { border-top:1px solid var(--rule); padding: clamp(5rem,10vw,10rem) var(--pad-x) clamp(4rem,8vw,8rem); position:relative; overflow:hidden; }
.cghost { position:absolute; bottom:-3rem; left:50%; transform:translateX(-50%); font-family:var(--f-sans); font-weight:800; font-size:clamp(5rem,18vw,16rem); letter-spacing:-.06em; white-space:nowrap; color:rgba(240,236,227,.022); pointer-events:none; line-height:1; user-select:none; }
.cinner { max-width:780px; margin:0 auto; text-align:center; position:relative; z-index:1; }
.csub { font-family:var(--f-mono); font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dim); margin-bottom:2rem; }
.ch2 { font-family:var(--f-sans); font-weight:800; font-size:clamp(2rem,5.5vw,5.5rem); letter-spacing:-.04em; line-height:1.05; margin-bottom:1.5rem; }
.clead { font-size: clamp(.9rem,1.5vw,1.05rem); line-height:1.78; color:var(--fg2); font-style:italic; margin-bottom:3rem; }
.crow { display:flex; justify-content:center; gap:.9rem; flex-wrap:wrap; margin-bottom:3.5rem; }
.cf { max-width:540px; margin:0 auto; text-align:left; display:flex; flex-direction:column; gap:.85rem; width:100%; }
.cfg { display:grid; grid-template-columns:1fr 1fr; gap:.85rem; }
.clabel { display:block; font-family:var(--f-mono); font-size:.52rem; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); margin-bottom:.3rem; }
.cinp, .cta {
  width:100%; background:transparent; border:none; border-bottom:1px solid var(--rule);
  color:var(--fg); font-family:var(--f-serif); font-size:1rem;
  padding:.65rem 0; outline:none; cursor:none; transition:border-color .2s;
}
.cinp:focus, .cta:focus { border-color:rgba(240,236,227,.45); }
.cta { resize:none; min-height:95px; }
.cbtn { align-self:flex-start; margin-top:.4rem; font-family:var(--f-mono); font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--bg); background:var(--fg); border:none; padding:.88rem 2.2rem; cursor:none; transition:opacity .2s; font-weight:600; }
.cbtn:hover { opacity:.8; }
.cbtn.sent { opacity:.5; }
.srow-ct { display:flex; justify-content:center; gap:.7rem; flex-wrap:wrap; margin-top:4rem; }

function genGraph() {
  const weeks = [];
  const today = new Date();
  for (let w = 52; w >= 0; w--) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      const r = Math.random();
      let l = 0;
      if (r > .55) l = 1; if (r > .72) l = 2; if (r > .84) l = 3; if (r > .93) l = 4;
      const dt = new Date(today);
      dt.setDate(today.getDate() - w * 7 - (6 - d));
      col.push({ l, dt });
    }
    weeks.push(col);
  }
  return weeks;
}

<script>
gsap.registerPlugin(ScrollTrigger);

/* ── MOBILE MENU ── */
let menuOpen = false;
window.toggleMobileMenu = function() {
  menuOpen = !menuOpen;
  const menu = document.getElementById('mobileMenu');
  const btn = document.getElementById('mobileToggle');
  menu.classList.toggle('open', menuOpen);
  btn.classList.toggle('open', menuOpen);
  document.body.style.overflow = menuOpen ? 'hidden' : '';
};
window.closeMobileMenu = function() {
  menuOpen = false;
  document.getElementById('mobileMenu').classList.remove('open');
  const btn = document.getElementById('mobileToggle');
  if(btn) btn.classList.remove('open');
  document.body.style.overflow = '';
};

/* ── CURSOR (desktop only) ── */
const isTouch = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;
const dot = document.getElementById('cdot'), ring = document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
if(!isTouch()){
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  });
  (function lp(){ rx+=(mx-rx)*.09; ry+=(my-ry)*.09; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(lp); })();
  const hovers = 'a,button,.sc,.ptrig,.agc,.rcard,.soc,.sphone,.btn-s,.btn-o,.nhire,.pl';
  document.addEventListener('mouseover', e => { if(e.target.matches(hovers)) document.body.classList.add('cx'); });
  document.addEventListener('mouseout',  e => { if(e.target.matches(hovers)) document.body.classList.remove('cx'); });
}

/* ── NAV + SCROLL PROGRESS ── */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('stuck', window.scrollY > 60);
  const sp = document.getElementById('sp');
  const progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  sp.style.transform = `scaleX(${Math.min(1, progress)})`;
}, { passive: true });

/* ── LOADER ── */
const lfill = document.getElementById('lfill'), lnum = document.getElementById('lnum');
let p=0;
const iv = setInterval(()=>{
  p += Math.random()*9+2;
  if(p>=100){ p=100; clearInterval(iv); launchLoader(); }
  lfill.style.transform = `scaleX(${p/100})`;
  lnum.textContent = String(Math.floor(p)).padStart(3,'0');
}, 55);

function launchLoader(){
  const spans = document.querySelectorAll('#lt span');
  gsap.to(spans, {
    y:'-130%', stagger:.06, duration:.7, ease:'power3.in', delay:.25,
    onComplete: () => {
      gsap.to('#loader', { opacity:0, duration:.5, onComplete: () => {
        document.getElementById('loader').style.display='none';
        startPage();
      }});
    }
  });
}

function startPage(){
  const tl = gsap.timeline({ defaults:{ ease:'power3.out' } });
  tl.to('#heyebrow', { opacity:1, y:0, duration:.8 }, 0)
    .to('.h1 .wd',    { y:'0%', stagger:.12, duration:1.1 }, .25)
    .to('#hbot',      { opacity:1, y:0, duration:.85 }, .9)
    .to('#hsc',       { opacity:1, duration:.6 }, 1.2);

  // Parallax only on non-touch
  if(!isTouch()){
    gsap.to('.h1', { yPercent:10, ease:'none', scrollTrigger:{ trigger:'#hero', scrub:1.2 } });
  }

  document.querySelectorAll('.rv').forEach(el => {
    gsap.fromTo(el, { y:35, opacity:0 }, {
      y:0, opacity:1, duration:.9, ease:'power3.out',
      scrollTrigger:{ trigger:el, start:'top 87%', once:true }
    });
  });

  gsap.utils.toArray('.sc').forEach((el,i) => {
    gsap.fromTo(el, { opacity:0, y:18 }, {
      opacity:1, y:0, duration:.45, ease:'power2.out', delay:i*.028,
      scrollTrigger:{ trigger:'.sgrid', start:'top 82%', once:true }
    });
  });

  /* Text scramble on project names — desktop only */
  if(!isTouch()){
    const CH = '!<>-_\\/[]{}—=+*^?#';
    document.querySelectorAll('.pname').forEach(el => {
      const orig = el.textContent;
      el.addEventListener('mouseenter', () => {
        let iter=0;
        const iv2 = setInterval(()=>{
          el.textContent = orig.split('').map((c,i) => {
            if(i<iter) return orig[i];
            return c===' '?' ':CH[Math.floor(Math.random()*CH.length)];
          }).join('');
          if(iter>=orig.length) clearInterval(iv2);
          iter+=.55;
        }, 28);
      });
    });
  }

  // Refresh ScrollTrigger after fonts load
  if(document.fonts){
    document.fonts.ready.then(() => ScrollTrigger.refresh());
  }
}
</script>
